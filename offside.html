<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LineUp">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="Whistle-192.png">
<title>LineUp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    /* fill behind status bar on iOS when added to home screen */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  #top-bar {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 12px 6px;
    gap: 4px;
    flex-shrink: 0;
  }
  h1 { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #444; }
  #status { font-size: 12px; color: #ffcc00; text-align: center; min-height: 16px; }

  #upload-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    color: #555;
    font-size: 13px;
    letter-spacing: 2px;
    width: 100%;
    border-top: 1px dashed #222;
  }
  #upload-area svg { opacity: 0.25; }
  #upload-area:active { color: #999; }

  #viewport {
    flex: 1;
    width: 100%;
    overflow: hidden;
    position: relative;
    display: none;
    touch-action: none;
    cursor: grab;
  }
  #viewport:active { cursor: grabbing; }
  #canvas-wrap {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  canvas { display: block; }

  #crosshair {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 20;
  }

  #bottom-bar {
    display: none;
    width: 100%;
    flex-shrink: 0;
    padding: 8px 12px;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    border-top: 1px solid #1e1e1e;
  }
  #btn-place {
    background: #ffcc00;
    color: #000;
    border: none;
    padding: 10px 28px;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    border-radius: 2px;
  }
  #btn-place:active { background: #e6b800; }
  #btn-place:disabled { background: #2a2a2a; color: #555; }
  .btn-sec {
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    border-radius: 2px;
  }
  .btn-sec:active { border-color: #888; color: #ccc; }
</style>
</head>
<body>

<div id="top-bar">
  <h1>LineUp</h1>
  <div id="status">Tap to upload a photo</div>
</div>

<div id="upload-area" onclick="document.getElementById('file-input').click()">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
  Tap to upload match photo
  <input type="file" id="file-input" accept="image/*" style="display:none">
</div>

<div id="viewport">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="crosshair">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <line x1="22" y1="0"  x2="22" y2="15" stroke="rgba(0,0,0,0.7)" stroke-width="3"/>
      <line x1="22" y1="29" x2="22" y2="44" stroke="rgba(0,0,0,0.7)" stroke-width="3"/>
      <line x1="0"  y1="22" x2="15" y2="22" stroke="rgba(0,0,0,0.7)" stroke-width="3"/>
      <line x1="29" y1="22" x2="44" y2="22" stroke="rgba(0,0,0,0.7)" stroke-width="3"/>
      <circle cx="22" cy="22" r="4.5" stroke="rgba(0,0,0,0.7)" stroke-width="3" fill="none"/>
      <line x1="22" y1="0"  x2="22" y2="15" stroke="white" stroke-width="1.5"/>
      <line x1="22" y1="29" x2="22" y2="44" stroke="white" stroke-width="1.5"/>
      <line x1="0"  y1="22" x2="15" y2="22" stroke="white" stroke-width="1.5"/>
      <line x1="29" y1="22" x2="44" y2="22" stroke="white" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="4.5" stroke="white" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
</div>

<div id="bottom-bar">
  <button class="btn-sec" onclick="undoPoint()">↩ Undo</button>
  <button id="btn-place" onclick="placeAtCrosshair()">Place point</button>
  <button class="btn-sec" onclick="savePhoto()">↓ Save</button>
</div>

<script>
// ── DOM refs ─────────────────────────────────────────────────
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const wrap      = document.getElementById('canvas-wrap');
const vpEl      = document.getElementById('viewport');
const statusEl  = document.getElementById('status');
const btnPlace  = document.getElementById('btn-place');
const crosshair = document.getElementById('crosshair');

// ── State ────────────────────────────────────────────────────
let img    = null;
let points = [];
let step   = 0;
let done   = false;
let logW   = 0, logH = 0;   // logical (CSS) canvas size
let dpr    = 1;

// ── Pan/zoom ─────────────────────────────────────────────────
let viewScale = 1, viewTx = 0, viewTy = 0;
let fitScale  = 1;
const MAX_SCALE = 12;

function clamp() {
  // Scale floor = photo fills viewport
  viewScale = Math.min(MAX_SCALE, Math.max(fitScale, viewScale));
  const vpW = vpEl.clientWidth, vpH = vpEl.clientHeight;
  const sw  = logW * viewScale, sh = logH * viewScale;
  if (sw >= vpW) {
    viewTx = Math.min(0, Math.max(vpW - sw, viewTx));
  } else {
    viewTx = (vpW - sw) / 2;
  }
  if (sh >= vpH) {
    viewTy = Math.min(0, Math.max(vpH - sh, viewTy));
  } else {
    viewTy = (vpH - sh) / 2;
  }
}

function applyTransform() {
  clamp();
  wrap.style.transform = `translate(${viewTx}px,${viewTy}px) scale(${viewScale})`;
}

function crosshairToCanvas() {
  const vpW = vpEl.clientWidth, vpH = vpEl.clientHeight;
  return { x: (vpW / 2 - viewTx) / viewScale, y: (vpH / 2 - viewTy) / viewScale };
}

// ── Upload ────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const newImg = new Image();
    newImg.onload = () => {
      img = newImg;
      dpr = window.devicePixelRatio || 1;
      const vpW = vpEl.clientWidth  || window.innerWidth;
      const vpH = vpEl.clientHeight || window.innerHeight * 0.75;
      const s   = Math.min(vpW / img.width, vpH / img.height);
      logW = Math.round(img.width  * s);
      logH = Math.round(img.height * s);

      // Set canvas resolution at full device pixels
      canvas.width          = logW * dpr;
      canvas.height         = logH * dpr;
      canvas.style.width    = logW + 'px';
      canvas.style.height   = logH + 'px';
      // Reset transform then scale once for DPR
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      fitScale  = Math.max(vpW / logW, vpH / logH);
      viewScale = fitScale;
      viewTx    = (vpW - logW * fitScale) / 2;
      viewTy    = (vpH - logH * fitScale) / 2;
      applyTransform();

      document.getElementById('upload-area').style.display = 'none';
      vpEl.style.display = 'block';
      document.getElementById('bottom-bar').style.display = 'flex';
      crosshair.style.display = 'block';

      step = 1; points = []; done = false;
      updateStatus();
      draw();
    };
    newImg.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── Touch ─────────────────────────────────────────────────────
let touches    = {};
let pDist      = null, pMid = null;
let panTx0, panTy0, panX0, panY0;

function tOff(cx, cy) {
  const r = vpEl.getBoundingClientRect();
  return { x: cx - r.left, y: cy - r.top };
}
function tDist() {
  const [a, b] = Object.values(touches);
  return Math.hypot(b.x - a.x, b.y - a.y);
}
function tMid() {
  const [a, b] = Object.values(touches);
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

vpEl.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = tOff(t.clientX, t.clientY);
  const ids = Object.keys(touches);
  if (ids.length === 1) {
    panTx0 = viewTx; panTy0 = viewTy;
    panX0 = touches[ids[0]].x; panY0 = touches[ids[0]].y;
  }
  if (ids.length === 2) { pDist = tDist(); pMid = tMid(); }
}, { passive: false });

vpEl.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = tOff(t.clientX, t.clientY);
  const ids = Object.keys(touches);

  if (ids.length === 1) {
    viewTx = panTx0 + (touches[ids[0]].x - panX0);
    viewTy = panTy0 + (touches[ids[0]].y - panY0);
    applyTransform();
  }
  if (ids.length === 2) {
    const nd = tDist(), nm = tMid();
    const factor   = nd / (pDist || nd);
    const newScale = Math.min(MAX_SCALE, Math.max(fitScale, viewScale * factor));
    const mx = nm.x, my = nm.y;
    viewTx = mx - (mx - viewTx) * (newScale / viewScale) + (nm.x - pMid.x);
    viewTy = my - (my - viewTy) * (newScale / viewScale) + (nm.y - pMid.y);
    viewScale = newScale; pDist = nd; pMid = nm;
    applyTransform();
  }
}, { passive: false });

vpEl.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) delete touches[t.identifier];
  pDist = null;
  const ids = Object.keys(touches);
  if (ids.length === 1) {
    panTx0 = viewTx; panTy0 = viewTy;
    panX0 = touches[ids[0]].x; panY0 = touches[ids[0]].y;
  }
}, { passive: false });

// ── Mouse ─────────────────────────────────────────────────────
let mDown = false, mMoved = false, mX0, mY0, mTx0, mTy0;
vpEl.addEventListener('mousedown', e => {
  mDown = true; mMoved = false;
  mX0 = e.clientX; mY0 = e.clientY; mTx0 = viewTx; mTy0 = viewTy;
});
window.addEventListener('mousemove', e => {
  if (!mDown) return;
  const dx = e.clientX - mX0, dy = e.clientY - mY0;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mMoved = true;
  viewTx = mTx0 + dx; viewTy = mTy0 + dy;
  applyTransform();
});
window.addEventListener('mouseup', () => { mDown = false; });
vpEl.addEventListener('wheel', e => {
  e.preventDefault();
  const r  = vpEl.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const f  = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const ns = Math.min(MAX_SCALE, Math.max(fitScale, viewScale * f));
  viewTx = mx - (mx - viewTx) * (ns / viewScale);
  viewTy = my - (my - viewTy) * (ns / viewScale);
  viewScale = ns;
  applyTransform();
}, { passive: false });

vpEl.addEventListener('click', e => {
  if (mMoved || done || step < 1 || step > 5) return;
  placeAtCrosshair();
});

// ── Place ─────────────────────────────────────────────────────
function placeAtCrosshair() {
  if (done || step < 1 || step > 5) return;
  const { x, y } = crosshairToCanvas();
  if (x < 0 || x > logW || y < 0 || y > logH) {
    statusEl.textContent = 'Crosshair is outside the image!';
    return;
  }
  points.push({ x, y });
  step++;
  updateStatus();
  draw();
  if (step === 6) computeAndDraw();
}

const STEPS = ['',
  'Zoom in, aim crosshair at grass stripe 1  (1/2)',
  'Zoom in, aim crosshair at grass stripe 1  (2/2)',
  'Zoom in, aim crosshair at grass stripe 2  (1/2)',
  'Zoom in, aim crosshair at grass stripe 2  (2/2)',
  "Aim crosshair at defender's feet",
];
const COLORS = ['#00aaff','#00aaff','#00ff88','#00ff88','#ff4444'];
const LABELS = ['S1','S1','S2','S2','DEF'];

function updateStatus() {
  if (step >= 1 && step <= 5) {
    statusEl.textContent   = STEPS[step];
    btnPlace.disabled      = false;
    btnPlace.textContent   = 'Place point ' + step + ' / 5';
  } else if (step === 6) {
    statusEl.textContent = 'Done — save or reset.';
    btnPlace.disabled    = true;
    btnPlace.textContent = 'Done ✓';
    done = true;
  }
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, logW, logH);
  ctx.drawImage(img, 0, 0, logW, logH);

  points.forEach((p, i) => {
    const c  = COLORS[i];
    const sz = 6;
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.moveTo(p.x - sz, p.y); ctx.lineTo(p.x + sz, p.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x, p.y - sz); ctx.lineTo(p.x, p.y + sz); ctx.stroke();
    ctx.strokeStyle = c;
    ctx.lineWidth   = 0.75;
    ctx.beginPath(); ctx.moveTo(p.x - sz, p.y); ctx.lineTo(p.x + sz, p.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x, p.y - sz); ctx.lineTo(p.x, p.y + sz); ctx.stroke();
    const fs = Math.max(7, logW * 0.015);
    ctx.font      = `bold ${fs}px Courier New`;
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillText(LABELS[i], p.x + 8, p.y - 4);
    ctx.fillStyle = c;                  ctx.fillText(LABELS[i], p.x + 7, p.y - 5);
  });

  if (points.length >= 2) drawDashedLine(points[0], points[1], '#00aaff');
  if (points.length >= 4) drawDashedLine(points[2], points[3], '#00ff88');
}

function drawDashedLine(a, b, color) {
  const [p1, p2] = extendLine(a, b);
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  ctx.strokeStyle = color;              ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  ctx.setLineDash([]);
}

function extendLine(a, b) {
  const W = logW, H = logH, dx = b.x - a.x, dy = b.y - a.y;
  let lo = -1e9, hi = 1e9;
  if (Math.abs(dx) > 1e-4) {
    const t1 = -a.x / dx, t2 = (W - a.x) / dx;
    lo = Math.max(lo, Math.min(t1, t2));
    hi = Math.min(hi, Math.max(t1, t2));
  }
  if (Math.abs(dy) > 1e-4) {
    const t1 = -a.y / dy, t2 = (H - a.y) / dy;
    lo = Math.max(lo, Math.min(t1, t2));
    hi = Math.min(hi, Math.max(t1, t2));
  }
  return [{ x: a.x + lo * dx, y: a.y + lo * dy }, { x: a.x + hi * dx, y: a.y + hi * dy }];
}

function intersect(a, b, c, d) {
  const A1 = b.y-a.y, B1 = a.x-b.x, C1 = A1*a.x + B1*a.y;
  const A2 = d.y-c.y, B2 = c.x-d.x, C2 = A2*c.x + B2*c.y;
  const det = A1*B2 - A2*B1;
  if (Math.abs(det) < 1e-6) return null;
  return { x: (C1*B2 - C2*B1) / det, y: (A1*C2 - A2*C1) / det };
}

function computeAndDraw() {
  draw();
  const vpt = intersect(points[0], points[1], points[2], points[3]);
  if (!vpt) { statusEl.textContent = 'Lines are parallel — try more angled stripes.'; return; }

  const [p1, p2] = extendLine(points[4], vpt);
  // Thin shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  // Thin yellow line
  ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

  const fs = Math.max(7, logW * 0.017);
  ctx.font = `bold ${fs}px Courier New`;
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillText('OFFSIDE LINE', 10, logH - 8);
  ctx.fillStyle = '#ffcc00';          ctx.fillText('OFFSIDE LINE',  9, logH - 9);
}

// ── Actions ───────────────────────────────────────────────────
function undoPoint() {
  if (!points.length) return;
  points.pop(); done = false;
  step = Math.max(1, step - 1);
  updateStatus(); draw();
}
function savePhoto() {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = 'offside.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }, 'image/png');
}
</script>
</body>
</html>
